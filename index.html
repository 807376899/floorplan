<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>实验室分布图生成器</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div class="brand">
          <h1>实验室分布图生成器</h1>
          <p>房间数据与楼层布局分开维护，走廊段可自由组合成任意楼层形状。</p>
        </div>
        <div class="controls">
          <label class="file-control">
            <span>导入房间表</span>
            <input id="roomFileInput" type="file" accept=".csv,.xlsx,.xls" />
          </label>
          <label class="file-control">
            <span>导入楼层表</span>
            <input id="floorFileInput" type="file" accept=".csv,.xlsx,.xls" />
          </label>
          <button id="loadSampleBtn" type="button">载入测试数据</button>
          <button id="downloadRoomTemplateBtn" type="button">下载房间模板</button>
          <button id="downloadFloorTemplateBtn" type="button">下载楼层模板</button>
        </div>
      </section>

      <section class="filters">
        <label>教学楼<select id="buildingSelect"></select></label>
        <label>楼层<select id="floorSelect"></select></label>
        <label>学院高亮<select id="collegeSelect"></select></label>
      </section>

      <section class="status-row">
        <div id="statusText">正在载入测试数据...</div>
        <div id="legend" class="legend"></div>
      </section>

      <section class="workspace">
        <aside class="floor-switcher">
          <h2>楼层缩略图</h2>
          <div id="floorThumbs" class="floor-thumbs"></div>
        </aside>
        <div class="canvas-panel">
          <div class="canvas-toolbar">
            <span id="canvasModeText">适配显示</span>
            <div>
              <button id="fitCanvasBtn" type="button">适配</button>
              <button id="actualCanvasBtn" type="button">原始大小</button>
            </div>
          </div>
          <div id="floorplan" class="floorplan is-fit"></div>
        </div>
        <aside class="details">
          <h2>房间信息</h2>
          <div id="roomDetails" class="room-details">点击图中的房间查看详情。</div>
          <h2>JSON 预览</h2>
          <pre id="jsonPreview"></pre>
        </aside>
      </section>

      <section class="data-panel">
        <div class="panel-heading">
          <div>
            <h2>数据编辑</h2>
            <p>楼层表描述走廊骨架，房间表只引用走廊段。任意复杂形状都可由多条线段组合。</p>
          </div>
          <div class="editor-tabs">
            <button id="showRoomsBtn" class="is-active" type="button">房间表</button>
            <button id="showFloorsBtn" type="button">楼层表</button>
          </div>
          <div class="editor-actions">
            <button id="addRowBtn" type="button">新增行</button>
            <button id="applyTableBtn" type="button">应用修改</button>
            <button id="downloadCsvBtn" type="button">导出当前表</button>
          </div>
        </div>
        <div id="dataEditor" class="data-editor"></div>
      </section>
    </main>
  </body>
</html>
