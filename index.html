<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>实验室分布图生成器</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="数据导入和筛选">
        <div class="brand">
          <h1>实验室分布图生成器</h1>
          <p>CSV/Excel 转 JSON，并按走廊分段、南北侧、端头房间和学院颜色生成 2D SVG 分布图。</p>
        </div>

        <div class="controls">
          <label class="file-control">
            <span>导入 CSV / Excel</span>
            <input id="fileInput" type="file" accept=".csv,.xlsx,.xls" />
          </label>
          <button id="loadSampleBtn" type="button">载入测试数据</button>
          <button id="downloadJsonBtn" type="button">导出 JSON</button>
        </div>
      </section>

      <section class="filters" aria-label="图纸筛选">
        <label>
          教学楼
          <select id="buildingSelect"></select>
        </label>
        <label>
          楼层
          <select id="floorSelect"></select>
        </label>
        <label>
          学院高亮
          <select id="collegeSelect"></select>
        </label>
      </section>

      <section class="status-row">
        <div id="statusText">正在载入测试数据...</div>
        <div id="legend" class="legend" aria-label="学院颜色图例"></div>
      </section>

      <section class="workspace">
        <aside class="floor-switcher" aria-label="楼层缩略图">
          <h2>楼层缩略图</h2>
          <div id="floorThumbs" class="floor-thumbs"></div>
        </aside>

        <div id="floorplan" class="floorplan" aria-label="SVG 分布图"></div>

        <aside class="details">
          <h2>房间信息</h2>
          <div id="roomDetails" class="room-details">点击图中的房间查看详情。</div>
          <h2>JSON 预览</h2>
          <pre id="jsonPreview"></pre>
        </aside>
      </section>
    </main>
  </body>
</html>
